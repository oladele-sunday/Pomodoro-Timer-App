<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - Pomodoro Timer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href=Timer.css">
</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="logo">

            <i class="fa-solid fa-bullseye"></i>

            <h1>FocusFlow</h1>

        </div>

        <div class="header-right">

            <button class="focus-mode-btn">

                <i class="fa-solid fa-expand"></i>

                <span>Focus Mode</span>

            </button>

            <div class="avatar">
                <img src="https://res.cloudinary.com/dkkiuteyj/image/upload/v1781292779/profile_plstto.png"
                    alt="Profile">
            </div>

        </div>

    </header>

    <!-- MOBILE MODE TABS -->

    <section class="mode-tabs">

        <button class="mode-btn active" data-mode="focus">
            Focus
        </button>

        <button class="mode-btn" data-mode="shortBreak">
            Short Break
        </button>

        <button class="mode-btn" data-mode="longBreak">
            Long Break
        </button>

    </section>

    <!-- TASK SECTION -->

    <section class="task-section">

        <p class="task-label">
            CURRENTLY WORKING ON
        </p>

        <h2 class="task-title">
            Develop API Endpoints
        </h2>

    </section>

    <!-- TIMER SECTION -->

    <section class="timer-section">

        <div class="timer-container">

            <!-- SVG Progress Ring -->

            <svg class="progress-ring" width="520" height="520" viewBox="0 0 520 520">

                <circle class="progress-ring-bg" cx="260" cy="260" r="220">
                </circle>

                <circle class="progress-ring-circle" cx="260" cy="260" r="220">
                </circle>

            </svg>

            <!-- Timer Content -->

            <div class="timer-content">

                <h1 id="timer">
                    25:00
                </h1>

                <div class="deep-flow">

                    <i class="fa-solid fa-bolt"></i>

                    <span>DEEP FLOW</span>

                </div>

            </div>

        </div>

    </section>

    <!-- CONTROLS -->

    <section class="controls">

        <button id="resetBtn" class="control-btn">

            <i class="fa-solid fa-rotate-left"></i>

        </button>

        <button id="playBtn" class="play-btn">

            <i class="fa-solid fa-play"></i>

        </button>

        <button id="skipBtn" class="control-btn">

            <i class="fa-solid fa-forward-step"></i>

        </button>

    </section>

    <!-- MOBILE BOTTOM NAV -->

    <nav class="bottom-nav">

        <a href="#" class="nav-item active">

            <i class="fa-regular fa-clock"></i>

            <span>Focus</span>

        </a>

        <a href="#" class="nav-item">

            <i class="fa-solid fa-list"></i>

            <span>Tasks</span>

        </a>

        <a href="#" class="nav-item">

            <i class="fa-regular fa-chart-bar"></i>

            <span>Stats</span>

        </a>

        <a href="#" class="nav-item">

            <i class="fa-regular fa-user"></i>

            <span>Profile</span>

        </a>

        <a href="#" class="nav-item">

            <i class="fa-solid fa-gear"></i>

            <span>Settings</span>

        </a>

    </nav>

    <script src="Timer.js"></script>

</body>

</html>
